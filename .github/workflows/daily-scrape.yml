name: Daily AI News Scrape

on:
  schedule:
    # UTC 22:00 = 北京时间 06:00
    - cron: '0 22 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: npx ts-node src/scrape/index.ts

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          commit_message: 'Update AI News - ${{ github.event.head_commit.timestamp }}'
