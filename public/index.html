<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily AI News - 每日AI资讯</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-container">
      <div class="logo">
        <span class="logo-icon">🤖</span>
        <div class="logo-text">
          <h1>AI News</h1>
          <span class="logo-subtitle">每日AI资讯精选</span>
        </div>
      </div>
      <div class="header-right">
        <div class="update-badge">
          <span class="update-dot"></span>
          <span id="updateTime">加载中...</span>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section id="insightsSection" class="insights-section" style="display: none;">
      <div class="insights-header">
        <span class="insights-icon">💡</span>
        <h2>本期洞察</h2>
      </div>
      <div id="insightsContent" class="insights-list"></div>
    </section>

    <section class="featured-section">
      <div class="featured-grid" id="featuredGrid"></div>
    </section>

    <section class="news-section">
      <div class="section-header">
        <h2>全部资讯</h2>
        <span class="news-count" id="newsCount"></span>
      </div>
      <div class="news-list" id="newsList"></div>
    </section>
  </main>

  <!-- Article Reader Modal -->
  <div id="readerModal" class="modal">
    <div id="modalBackdrop" class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title-area">
          <span class="modal-source" id="modalSource"></span>
          <h3 id="modalTitle"></h3>
        </div>
        <div class="modal-actions">
          <a id="openSameTabBtn" href="" target="_self" class="modal-btn" title="在当前窗口打开">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
              <polyline points="15 3 21 3 21 9"></polyline>
              <line x1="10" y1="14" x2="21" y2="3"></line>
            </svg>
          </a>
          <a id="openNewTabBtn" href="" target="_blank" rel="noopener" class="modal-btn" title="在新窗口打开">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="9" y1="3" x2="9" y2="21"></line>
            </svg>
          </a>
          <button id="modalCloseBtn" class="modal-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      </div>
      <div class="modal-body">
        <iframe id="articleFrame" class="article-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-content">
      <p>每日北京时间 06:00 自动更新</p>
      <p class="footer-sources">数据来源: Reddit · Hacker News · 36氪 · IT之家 · 少数派</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
